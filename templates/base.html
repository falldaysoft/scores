<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Scores{% endblock %} - scores.fallday.ca</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="h-full bg-gray-50" hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
    {% block body %}
    <div class="min-h-full">
        <nav class="bg-indigo-600">
            <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
                <div class="flex h-16 items-center justify-between">
                    <div class="flex items-center">
                        <a href="{% url 'home' %}" class="flex items-center">
                            <span class="text-2xl font-bold text-white">Scores</span>
                        </a>
                    </div>
                    <div class="flex items-center space-x-4">
                        {% if user.is_authenticated %}
                        <a href="{% url 'games:dashboard' %}" class="text-white hover:text-indigo-200 px-3 py-2 text-sm font-medium">Dashboard</a>
                        <form method="post" action="{% url 'accounts:logout' %}" class="inline">
                            {% csrf_token %}
                            <button type="submit" class="text-white hover:text-indigo-200 px-3 py-2 text-sm font-medium">Logout</button>
                        </form>
                        {% else %}
                        <a href="{% url 'accounts:login' %}" class="text-white hover:text-indigo-200 px-3 py-2 text-sm font-medium">Login</a>
                        <a href="{% url 'accounts:signup' %}" class="bg-white text-indigo-600 hover:bg-indigo-50 px-4 py-2 rounded-lg text-sm font-medium">Sign Up</a>
                        {% endif %}
                    </div>
                </div>
            </div>
        </nav>

        {% if messages %}
        <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 mt-4">
            {% for message in messages %}
            <div class="rounded-lg p-4 mb-2 {% if message.tags == 'error' %}bg-red-100 text-red-800{% elif message.tags == 'success' %}bg-green-100 text-green-800{% else %}bg-blue-100 text-blue-800{% endif %}"
                 x-data="{ show: true }" x-show="show" x-transition>
                <div class="flex justify-between items-center">
                    <p>{{ message }}</p>
                    <button @click="show = false" class="text-current opacity-50 hover:opacity-100">&times;</button>
                </div>
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <main>
            {% block content %}{% endblock %}
        </main>
    </div>
    {% endblock %}
</body>
</html>
