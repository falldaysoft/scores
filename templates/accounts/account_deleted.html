{% extends 'base.html' %}
{% block title %}Account Deleted{% endblock %}

{% block content %}
<div class="mx-auto max-w-2xl px-4 sm:px-6 lg:px-8 py-16">
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-8 text-center">
        <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
            </svg>
        </div>

        <h1 class="text-2xl font-bold text-gray-900 mb-4">Account Deleted</h1>

        <p class="text-gray-600 mb-2">
            Your account <strong class="text-gray-900">{{ deleted_email }}</strong> and all associated data have been permanently deleted.
        </p>

        <p class="text-gray-500 text-sm mb-8">
            Thank you for using Scores. We're sorry to see you go.
        </p>

        <a href="{% url 'home' %}" class="inline-block bg-indigo-600 text-white py-2 px-6 rounded-lg font-medium hover:bg-indigo-700 transition-colors">
            Return to Home
        </a>
    </div>
</div>
{% endblock %}
